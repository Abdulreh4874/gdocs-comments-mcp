name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Syntax-check every source file
        run: |
          for f in $(git ls-files 'src/*.js' 'scripts/*.mjs'); do
            echo "checking $f"
            node --check "$f"
          done

      - name: Validate JSON manifests
        run: node -e "JSON.parse(require('fs').readFileSync('package.json','utf8')); JSON.parse(require('fs').readFileSync('server.json','utf8')); console.log('manifests ok')"

      - name: MCP stdio smoke test (initialize + tools/list)
        run: node scripts/smoke.mjs

      - name: npm pack (verify publishable file set)
        run: npm pack --dry-run
